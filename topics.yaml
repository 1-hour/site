# 1hour.guide 内容生产队列
#
# 巡查每周一 09:00 自动消费此文件的第一个 status:pending 项，
# 用 distro pipeline 生成教程 → publish.sh 推送 → CF Workers Builds 上线。
#
# 编辑此文件来排队新教程。可通过 `git pull` 同步。
#
# 字段说明：
#   slug         必填，kebab-case，对应 tutorials/<slug>/
#   category     必填，code/ai/design/business/web/mind
#   topic        必填，给 LLM 的英文主题描述（含具体卖点）
#   tags         必填，逗号分隔
#   reference    可选，参考资料 URL，会被抓取喂给 LLM
#   next_step    可选，推荐的下一篇 slug
#   difficulty   可选，beginner|intermediate|advanced（默认 beginner）
#   status       pending | in-progress | published | skipped

