# 1hour.guide 内容生产队列
#
# 巡查每周一 09:00 自动消费第一个 status:pending 项。
#
# 受众优先级：非技术人群（运营、产品、创作者、副业选手）> 技术圈
# 选题原则：
#   - 必须能在 60 分钟内学到具体可见技能（不是"了解 X"）
#   - 标题包含明确成果（"卖出第一单"、"跑通第一条短视频"）
#   - 优先 AI 工具实战 + 副业入门 + 职场效率（高搜索量 + 高转化）
#
# 字段说明：
#   slug         必填，kebab-case
#   category     必填，新分类：creators/marketing/product/design/ai-tools/
#                automation/office/side-hustle/code/mind
#   audience     必填，目标读者画像（运营/产品/设计/创作者/职场新人/副业选手/学生）
#   pain_point   必填，他们的核心痛点（用于 prompt context）
#   topic        必填，给 LLM 的英文主题（含具体卖点）
#   tags         必填，逗号分隔
#   priority     P0=本月必发, P1=季度内, P2=储备
#   status       pending | in-progress | published | skipped

